[package]
  cjc-version = "1.0.5"
  name = "stdx_web"
  version = "1.0.0"
  output-type = "executable"
  compile-option = "-ldl"

[dependencies]

# 注意：path-option 需替换为实际的 stdx 静态库路径
[target.x86_64-unknown-linux-gnu]
  [target.x86_64-unknown-linux-gnu.bin-dependencies]
    path-option = ["<STDX_PATH>/static/stdx"]
